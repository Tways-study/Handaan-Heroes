<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Handaan Heroes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-logo">Handaan Heroes</div>
        <ul class="admin-nav">
          <li><a href="#" class="active">Dashboard</a></li>
          <li><a href="index.html">View Storefront</a></li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="admin-main">
        <div class="dashboard-header">
          <h1 class="dashboard-title">Overview</h1>
        </div>

        <!-- Dashboard Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-title">Total Orders</span>
            <span class="stat-value" id="stat-orders">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-title">Total Items Rented</span>
            <span class="stat-value" id="stat-items">0</span>
          </div>
        </div>

        <div class="dashboard-header" style="margin-bottom: 20px">
          <h2 class="dashboard-title" style="font-size: 1.5rem">
            Recent Bookings
          </h2>
        </div>

        <!-- Orders Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Rental Date</th>
                <th>Contact</th>
                <th>Items</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-table-body">
              <!-- Loading State -->
              <tr>
                <td
                  colspan="6"
                  style="text-align: center; color: var(--text-muted)"
                >
                  Loading orders...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
      function formatItems(jsonStr) {
        try {
          const items = JSON.parse(jsonStr);
          const counts = {};
          items.forEach((i) => (counts[i.name] = (counts[i.name] || 0) + 1));
          return Object.entries(counts)
            .map(
              ([name, qty]) =>
                `<span class="item-badge">${qty}x ${name}</span>`,
            )
            .join(" ");
        } catch {
          return '<span class="item-badge" style="background: rgba(231,76,60,0.1); color: #E74C3C;">Invalid items</span>';
        }
      }

      function calculateTotalItems(orders) {
        let total = 0;
        orders.forEach((o) => {
          try {
            const items = JSON.parse(o.items_json);
            total += items.length;
          } catch (e) {}
        });
        return total;
      }

      async function fetchOrders() {
        try {
          const response = await fetch("http://localhost:3000/api/orders");
          if (!response.ok) throw new Error("Failed to fetch orders");
          const orders = await response.json();

          // Update Stats
          document.getElementById("stat-orders").innerText = orders.length;
          document.getElementById("stat-items").innerText =
            calculateTotalItems(orders);

          const tableBody = document.getElementById("admin-table-body");
          tableBody.innerHTML = "";

          if (orders.length === 0) {
            tableBody.innerHTML =
              '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">No orders found.</td></tr>';
            return;
          }

          orders.forEach((order) => {
            tableBody.innerHTML += `
                        <tr>
                            <td>#${order.id}</td>
                            <td style="font-weight: 600;">${order.customer_name}</td>
                            <td>${order.rental_date}</td>
                            <td>${order.contact_number}</td>
                            <td class="order-items-cell">${formatItems(order.items_json)}</td>
                            <td>
                                <button class="remove-btn" onclick="deleteOrder(${order.id})">Delete Order</button>
                            </td>
                        </tr>
                    `;
          });
        } catch (error) {
          console.error(error);
          showToast("Failed to load orders.", true);
          document.getElementById("admin-table-body").innerHTML =
            '<tr><td colspan="6" style="text-align: center; color: #E74C3C;">Error loading orders. Is the server running?</td></tr>';
        }
      }

      async function deleteOrder(id) {
        if (
          confirm(
            "Are you sure you want to delete this order? This action will restore the stock.",
          )
        ) {
          try {
            const response = await fetch(
              `http://localhost:3000/api/order/${id}`,
              { method: "DELETE" },
            );
            if (response.ok) {
              showToast("Order deleted successfully!");
              fetchOrders(); // Refresh the list
            } else {
              const err = await response.json();
              showToast(err.error || "Failed to delete order", true);
            }
          } catch (e) {
            showToast("Network error deleting order", true);
          }
        }
      }

      function showToast(message, isError = false) {
        const container = document.getElementById("toast-container");
        if (!container) return;

        const toast = document.createElement("div");
        toast.className = `toast ${isError ? "error" : ""}`;

        const icon = isError ? "⚠️" : "✓";
        toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => toast.classList.add("show"), 10);

        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 400);
        }, 3000);
      }

      window.onload = fetchOrders;
    </script>
  </body>
</html>
